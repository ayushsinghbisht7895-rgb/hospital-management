<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
   
}

.container {
    width: 400px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
   
}

h2 {
    text-align: center;
    color: #d32f2f;
}

label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

textarea {
    resize: none;
    height: 60px;
}

button {
    width: 100%;
    padding: 12px;
    background: #d32f2f;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #b71c1c;
}

#message {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
<body>

<div class="container">
    <h2>Emergency Appointment Booking</h2>

    <form id="emergencyForm">
        <label>Patient Full Name</label>
        <input type="text" id="name" required>

        <label>Age</label>
        <input type="number" id="age" required>

        <label>Gender</label>
        <select id="gender" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Contact Number</label>
        <input type="tel" id="contact" required>

        <label>Emergency Type</label>
        <select id="type" required>
            <option value="">Select Emergency</option>
            <option>Accident</option>
            <option>Heart Attack</option>
            <option>Breathing Problem</option>
            <option>High Fever</option>
            <option>Other</option>
        </select>

        <label>Address</label>
        <textarea id="address" required></textarea>

        <label>Need Ambulance?</label>
        <select id="ambulance" required>
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <input type="submit">
 



</div>
</div>
</body>
<body>
   <script src="script.js"></script> 
   </body>
</html>
