<style>
.machine-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

padding:30px;

}

.machine-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.machine-card img{
width:100px;
transition:0.3s;
}

.machine-card img:hover{
transform:scale(1.1);
}

.machine-card p{
font-weight:bold;
margin-top:10px;
}
</style>

</head>
